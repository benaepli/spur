name: Publish VSCode Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.vscode-target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - vscode-target: linux-x64
            rust-target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: spur-lsp
          - vscode-target: darwin-arm64
            rust-target: aarch64-apple-darwin
            os: macos-latest
            binary: spur-lsp
          - vscode-target: win32-x64
            rust-target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: spur-lsp.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Build spur-lsp
        run: cargo build --release -p spur-lsp --target ${{ matrix.rust-target }}

      - name: Copy binary into extension
        shell: bash
        run: |
          mkdir -p editors/code/server
          cp target/${{ matrix.rust-target }}/release/${{ matrix.binary }} editors/code/server/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies & compile extension
        working-directory: editors/code
        run: |
          npm ci
          npm run compile

      - name: Package VSIX
        working-directory: editors/code
        run: npx @vscode/vsce package --target ${{ matrix.vscode-target }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.vscode-target }}
          path: editors/code/*.vsix

  publish:
    name: Publish to Marketplace
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          merge-multiple: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Publish
        run: npx @vscode/vsce publish --packagePath *.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
